name: Deploy Inventory to Azure App Service

# Single App Service deployment — serves both the Express API and the React frontend.
# Build steps: install server deps → build client → build server → package → deploy.
#
# NOTE: prisma db push and demo-seed are NOT run here — execute manually from local:
#   $env:DATABASE_URL="..."; npx prisma db push
#   $env:DATABASE_URL="..."; npx tsx prisma/demo-seed.ts

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC federated credentials require id-token: write
permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '22.x'
  AZURE_APP_NAME: inventory-dev-app
  AZURE_RESOURCE_GROUP: meal-mind-dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install server dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build server (TypeScript)
        run: npm run build

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client (Vite)
        working-directory: ./client
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE || '/api' }}
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp -r prisma deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          mkdir -p deploy/public
          cp -r client/dist/* deploy/public/
          # Override Oryx manifest — az webapp deploy --type zip does NOT wipe wwwroot,
          # so the old oryx-manifest.toml persists and regenerates the wrong startup.sh.
          # Deploying our own manifest forces Oryx to use the correct startup command.
          printf 'NodeVersion = "22.x"\nStartupCommand = "node dist/index.js"\n' > deploy/oryx-manifest.toml

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID }}

      - name: Zip deployment package
        run: |
          cd deploy
          zip -r ../deploy.zip .
          cd ..
          ls -lh deploy.zip

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          slot-name: Production
          package: ./deploy.zip
          startup-command: 'node dist/index.js'
